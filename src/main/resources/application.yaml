# application.properties도 많이 쓰지만 설정이 많아지면 application.yaml이 더 효율적
#  로컬/개발/운영 환경에서 다른 값을 사용하는 방법 숙지 필요
spring:
  application:
    name: boot-study
# Upload 설정은 보통 최상위에 둔다
upload:
  path: C:/upload
  max-size: 10MB
  allowed-types:
    - image/png
    - image/jpeg
---
spring:
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:bootstudy
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8080

upload:
 path: C:/upload/local
 max-size: 10MB
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
server:
  port: ${SERVER_PORT:8080}   # prod에서는 환경변수로 포트를 받도록 설정
---
management:
  endpoints:
    web:
      exposure:
        include: health,info,conditions,beans